<!doctype html>
<html>
  <body style="margin:0;background:#f4f6fb;font-family:Arial,sans-serif;color:#1e293b;">
    <div style="max-width:680px;margin:32px auto;padding:0 16px;">
      <div style="background:#ffffff;border-radius:14px;border:1px solid #e2e8f0;overflow:hidden;">
        <div style="padding:18px 22px;background:#0f766e;color:#ffffff;font-weight:700;">IndustryPrime</div>
        <div style="padding:22px;">
          <h2 style="margin:0 0 12px;font-size:20px;">Leave Approval Request</h2>
          <p style="margin:0 0 8px;"><strong>Applicant:</strong> {{ applicant_name }} ({{ applicant_email }})</p>
          <p style="margin:0 0 8px;"><strong>Dates:</strong> {{ from_date }} -> {{ to_date }}</p>
          <p style="margin:0 0 6px;"><strong>Reason:</strong></p>
          <pre style="white-space:pre-wrap;margin:0;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:10px;">{{ reason }}</pre>
          <div style="margin-top:18px;display:flex;gap:10px;">
            <a href="{{ approve_url }}" style="background:#16a34a;color:#fff;text-decoration:none;padding:12px 18px;border-radius:8px;font-weight:700;">Approve</a>
            <a href="{{ reject_url }}" style="background:#dc2626;color:#fff;text-decoration:none;padding:12px 18px;border-radius:8px;font-weight:700;">Reject</a>
          </div>
        </div>
      </div>
      <p style="text-align:center;color:#64748b;font-size:12px;margin-top:12px;">Sent by IndustryPrime · aman@industryprime.com</p>
    </div>
  </body>
</html>
